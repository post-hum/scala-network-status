name: Collect XLA Network Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
        
      - name: Fetch and save data
        run: |
          # Fetch pool stats
          curl -s https://pool.scalaproject.io/api/stats > docs/current.json
          
          # Fetch emission
          curl -s https://emission.scala.network/ > /tmp/emission.html
          HEIGHT=$(grep -oP 'height["'\'']?\s*:\s*\K\d+' /tmp/emission.html | head -1)
          TOTAL=$(grep -oP 'total["'\'']?\s*:\s*\K\d+' /tmp/emission.html | head -1)
          CIRC=$(grep -oP 'circulatingSupply["'\'']?\s*:\s*\K\d+' /tmp/emission.html | head -1)
          echo "{\"height\": ${HEIGHT:-0}, \"total\": ${TOTAL:-0}, \"circulatingSupply\": ${CIRC:-0}}" > docs/emission.json
          
          # Update history
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DIFFICULTY=$(jq '.network.difficulty' docs/current.json)
          HEIGHT=$(jq '.network.height' docs/current.json)
          
          mkdir -p data
          if [ -f data/history.json ]; then
            jq --arg ts "$TIMESTAMP" --argjson diff "$DIFFICULTY" --argjson h "$HEIGHT" \
              '. + [{"timestamp": $ts, "difficulty": $diff, "height": $h}]' \
              data/history.json > data/tmp.json
          else
            echo "[{\"timestamp\": \"$TIMESTAMP\", \"difficulty\": $DIFFICULTY, \"height\": $HEIGHT}]" > data/tmp.json
          fi
          mv data/tmp.json data/history.json
          
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update network data [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
