name: Collect XLA Network Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
        
      - name: Fetch pool stats
        run: |
          curl -s https://pool.scalaproject.io/api/stats > /tmp/pool.json
          jq '.' /tmp/pool.json > docs/current.json
          
      - name: Fetch emission data
        run: |
          curl -s https://emission.scala.network/ > /tmp/emission.html
          
          HEIGHT=$(grep -oP 'height["'\'']?\s*:\s*\K\d+' /tmp/emission.html | head -1)
          TOTAL=$(grep -oP 'total["'\'']?\s*:\s*\K\d+' /tmp/emission.html | head -1)
          CIRC=$(grep -oP 'circulatingSupply["'\'']?\s*:\s*\K\d+' /tmp/emission.html | head -1)
          
          echo "{\"height\": ${HEIGHT:-0}, \"total\": ${TOTAL:-0}, \"circulatingSupply\": ${CIRC:-0}}" > docs/emission.json
          
      - name: Update history
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DIFFICULTY=$(jq '.network.difficulty' /tmp/pool.json)
          HEIGHT=$(jq '.network.height' /tmp/pool.json)
          
          mkdir -p data
          if [ -f data/history.json ]; then
            jq --arg ts "$TIMESTAMP" --argjson diff "$DIFFICULTY" --argjson h "$HEIGHT" \
              '. + [{"timestamp": $ts, "difficulty": $diff, "height": $h}]' \
              data/history.json > data/tmp.json
          else
            echo "[{\"timestamp\": \"$TIMESTAMP\", \"difficulty\": $DIFFICULTY, \"height\": $HEIGHT}]" > data/tmp.json
          fi
          mv data/tmp.json data/history.json
          
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://post-hum:${{ secrets.PAT_TOKEN }}@github.com/post-hum/scala-network-status.git
          git add docs/current.json docs/emission.json data/history.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update network data [skip ci]"
          git push origin main
