name: Collect XLA Network Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
        
      - name: Fetch and save data
        run: |
          curl -s https://pool.scalaproject.io/api/stats > current.json
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DIFFICULTY=$(jq '.network.difficulty' current.json)
          HEIGHT=$(jq '.network.height' current.json)
          
          mkdir -p data
          if [ -f data/history.json ]; then
            jq --arg ts "$TIMESTAMP" --argjson diff "$DIFFICULTY" --argjson h "$HEIGHT" \
              '. + [{"timestamp": $ts, "difficulty": $diff, "height": $h}]' \
              data/history.json > data/tmp.json
          else
            echo "[{\"timestamp\": \"$TIMESTAMP\", \"difficulty\": $DIFFICULTY, \"height\": $HEIGHT}]" > data/tmp.json
          fi
          mv data/tmp.json data/history.json
          
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add current.json data/history.json
          git diff --staged --quiet || git commit -m "Update network data"
          
      - name: Trigger Pages rebuild
        run: |
          # Пустой коммит для триггера Pages
          git commit --allow-empty -m "Trigger Pages rebuild [skip ci]" || true
          git push
